<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moving Cross</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black; /* clean background */
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<script>
// ---- Config ----
const SIZE = 40;
const JITTER_AMPLITUDE = 1; // max movement in pixels
const JITTER_FREQ = 40;       // Hz (how fast it moves)

// ---- Canvas ----
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ---- Resize ----
function resize() {
  const dpr = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ---- Draw Cross ----
function drawCross(x, y) {
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(x - SIZE / 2, y);
  ctx.lineTo(x + SIZE / 2, y);
  ctx.moveTo(x, y - SIZE / 2);
  ctx.lineTo(x, y + SIZE / 2);
  ctx.stroke();
}

// ---- Animation ----
let startTime = 0;

function loop(t) {
  const now = t / 1000;
  if (!startTime) startTime = now;

  const elapsed = now - startTime;

  // center position
  const baseX = window.innerWidth / 2;
  const baseY = window.innerHeight / 2;

  // smooth jitter (sinusoidal)
  const jitterX = Math.sin(2 * Math.PI * JITTER_FREQ * elapsed) * JITTER_AMPLITUDE;
  const jitterY = Math.cos(2 * Math.PI * JITTER_FREQ * elapsed) * JITTER_AMPLITUDE;

  const x = baseX + jitterX;
  const y = baseY + jitterY;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawCross(x, y);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
