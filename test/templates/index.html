<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixation</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
}

/* Center fixation cross */
#fixation {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 80px;
    font-family: monospace;
    user-select: none;
}
</style>

</head>

<body>

<div id="fixation">+</div>

</body>
</html>
