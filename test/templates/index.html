<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSVEP Fixation Task</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
  }

  #fixation {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 60px;
    font-family: monospace;
    user-select: none;
  }
</style>
</head>

<body>
<div id="fixation">+</div>

<script>
const fixation = document.getElementById("fixation");

// ===============================
// STATE
// ===============================
let collecting = false;
let trialActive = false;

let trialStart = null;
let trialTimeout = null;

let eventCount = 0;
let maxEvents = 30;
let blockDurationMs = 60000;
let responseWindowMs = 600;

let minISI = 5000;
let maxISI = 9000;

let blockStartTime = null;
let blockStartWallTime = null;

// ===============================
// DATA BUFFER
// ===============================
let logs = [];

// ===============================
// HELPERS
// ===============================
function randomISI() {
  return Math.random() * (maxISI - minISI) + minISI;
}

function resetFixation() {
  fixation.style.fontSize = "60px";
}

// ===============================
// START
// ===============================
async function startCollection() {
  // optional start signal (NOT critical timing)
  fetch("/start", { method: "POST" }).catch(() => {});

  collecting = true;
  eventCount = 0;

  logs = []; // reset buffer

  blockStartTime = performance.now();
  blockStartWallTime = Date.now();

  console.log("🟢 Block started");

  scheduleNextStimulus();
}

// ===============================
// STOP (SEND EVERYTHING ONCE)
// ===============================
async function stopCollection() {
  if (!collecting) return;

  collecting = false;

  resetFixation();

  const filename = prompt("Enter filename:", "block1");

  const payload = {
    filename: filename,
    meta: {
      block_start_perf: blockStartTime,
      block_start_wall: blockStartWallTime,
      block_end_perf: performance.now(),
      total_trials: logs.length,
      max_events: maxEvents,
      response_window_ms: responseWindowMs,
      isi_range: [minISI, maxISI]
    },
    logs: logs
  };

  console.log("📦 Sending logs:", payload);

  try {
    await fetch("/stop", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    console.log("🔴 Block stopped & data sent");
  } catch (err) {
    console.error("❌ Failed to send data:", err);
  }

  // clear logs after sending
  logs = [];
}

// ===============================
// STIMULUS SCHEDULING
// ===============================
function scheduleNextStimulus() {
  if (!collecting) return;

  if (eventCount >= maxEvents) {
    stopCollection();
    return;
  }

  const now = performance.now();
  if (now - blockStartTime >= blockDurationMs) {
    stopCollection();
    return;
  }

  const delay = randomISI();

  setTimeout(triggerStimulus, delay);
}

// ===============================
// TRIAL START
// ===============================
function triggerStimulus() {
  if (!collecting) return;

  fixation.style.fontSize = "40px";

  trialStart = performance.now();
  trialActive = true;
  eventCount++;

  // timeout = miss
  trialTimeout = setTimeout(() => {
    if (trialActive) {
      logTrial(false, null);
      trialActive = false;
      resetFixation();
      scheduleNextStimulus();
    }
  }, responseWindowMs);
}

// ===============================
// LOGGING (LOCAL ONLY)
// ===============================
function logTrial(hit, rt) {
  if (!collecting) return;

  logs.push({
    trial_number: eventCount,
    hit: hit,
    reaction_time_ms: rt,
    trial_start: trialStart,
    log_time: performance.now()
  });
}

// ===============================
// INPUT
// ===============================
document.addEventListener("keydown", (e) => {

  // response
  if (e.code === "Space" && trialActive) {
    const rt = performance.now() - trialStart;

    clearTimeout(trialTimeout);

    const hit = rt <= responseWindowMs;

    logTrial(hit, rt);

    trialActive = false;
    resetFixation();
    scheduleNextStimulus();
  }

  // controls
  if (e.key === "b") startCollection();
  if (e.key === "s") stopCollection();
});

</script>
</body>
</html>
